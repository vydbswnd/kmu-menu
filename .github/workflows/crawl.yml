name: 학식 메뉴 자동 크롤링

on:
  schedule:
    # UTC 21:00 = 한국시간 새벽 6:00 (GitHub cron은 UTC 기준)
    - cron: "0 21 * * *"
  # Actions 탭에서 수동으로도 실행할 수 있게 (테스트용)
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 가져오기
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 라이브러리 설치
        run: pip install -r requirements.txt

      - name: 크롤러 실행
        run: python kmu_crawler.py

      # 크롤 이상 감지: 학교 페이지 개편 등으로 '이번에 새로 긁어온' 데이터가 비면
      # (식당 3곳 미만 또는 오늘 이후 메뉴 0개) 워크플로우를 실패시켜 GitHub 알림 메일 발송.
      # 커밋 전에 검사하므로, 이상 시 빈/낡은 데이터를 덮어쓰거나 커밋하지 않는다.
      # (menus.json은 archive 백필이 있어 조용한 빈 크롤을 못 잡아 crawl_stats.json을 본다.)
      - name: 크롤 결과 이상 감지
        run: |
          python - <<'PY'
          import json, sys
          s = json.load(open("crawl_stats.json", encoding="utf-8"))
          rest = s.get("scraped_restaurants", 0)
          future = s.get("scraped_future_menus", 0)
          print(f"새로 긁어온 식당 {rest}곳, 오늘 이후 메뉴 {future}건")
          problems = []
          if rest < 3:
              problems.append(f"식당 수 {rest}곳(3곳 미만)")
          if future == 0:
              problems.append("오늘 이후 메뉴 0개")
          if problems:
              print("::error::크롤 결과 이상 감지 — " + ", ".join(problems)
                    + " (학교 페이지 개편 여부 확인 필요)")
              sys.exit(1)
          print("정상: 이상 없음")
          PY

      - name: 결과 커밋 & 푸시
        run: |
          git config user.name "menu-bot"
          git config user.email "actions@github.com"
          git add menus.json archive
          git diff --staged --quiet || git commit -m "🍚 메뉴 자동 갱신 $(date +'%Y-%m-%d')"
          git push

      # 오늘 이후 메뉴 중 칼로리 미매칭이 있으면 이슈로 알림.
      # continue-on-error로 이 단계가 실패해도 워크플로우는 성공 유지.
      - name: 칼로리 미매칭 검사 & 이슈 알림
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COUNT=$(python calorie_check.py)
          echo "칼로리 미매칭 고유 메뉴: ${COUNT}건"
          if [ "$COUNT" -gt 0 ]; then
            TITLE="칼로리 미매칭 메뉴"
            # 같은 제목의 열린 이슈가 있으면 재사용(제목 정확 일치로 필터)
            EXISTING=$(gh issue list --state open --limit 100 --json number,title \
              --jq "map(select(.title==\"${TITLE}\")) | .[0].number // empty")
            if [ -n "$EXISTING" ]; then
              gh issue comment "$EXISTING" --body-file unmatched.md
              echo "기존 이슈 #${EXISTING} 에 코멘트 추가"
            else
              gh issue create --title "$TITLE" --body-file unmatched.md
              echo "새 이슈 생성"
            fi
          fi
