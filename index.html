<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>국민대 오늘의 학식</title>
<meta name="description" content="국민대학교 학식 메뉴를 한눈에">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap" rel="stylesheet">
<style>
  /* ── 디자인 토큰: 색과 크기를 한 곳에서 관리 ── */
  :root {
    --navy: #0f2b5b;        /* 국민대 남색 */
    --navy-soft: #eaeff8;
    --ink: #1c1e24;
    --sub: #6b7280;
    --line: #e6e8ee;
    --bg: #f6f7fa;
    --card: #ffffff;
    --breakfast: #b45309;  --breakfast-bg: #fdf1e0;
    --lunch: #0f6e56;      --lunch-bg: #e3f4ed;
    --dinner: #5b45b0;     --dinner-bg: #edeafa;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Pretendard, -apple-system, sans-serif;
    background: var(--bg); color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }

  /* ── 상단 헤더 ── */
  header {
    background: var(--navy); color: #fff;
    padding: 22px 16px 14px;
  }
  header .wrap { max-width: 640px; margin: 0 auto; }
  h1 {
    font-family: 'Black Han Sans', Pretendard, sans-serif;
    font-size: 26px; font-weight: 400; letter-spacing: 0.5px;
  }
  h1 .bowl { color: #ffd66b; }
  .updated { font-size: 12px; opacity: 0.75; margin-top: 4px; }

  /* ── 요일 탭 ── */
  nav {
    position: sticky; top: 0; z-index: 10;
    background: var(--navy);
    padding: 8px 8px 12px;
    box-shadow: 0 2px 8px rgba(15,43,91,0.25);
  }
  .days {
    max-width: 640px; margin: 0 auto;
    display: flex; gap: 6px; overflow-x: auto;
    scrollbar-width: none;
  }
  .days::-webkit-scrollbar { display: none; }
  .day {
    flex: 1 0 auto; min-width: 74px;
    border: none; border-radius: 10px;
    background: rgba(255,255,255,0.12); color: #fff;
    padding: 8px 4px; text-align: center; cursor: pointer;
    font-family: inherit; font-size: 13px; line-height: 1.35;
  }
  .day b { display: block; font-size: 15px; }
  .day.past { opacity: 0.45; }
  .day.active { background: #fff; color: var(--navy); font-weight: 700; opacity: 1; }
  .day.today-mark b::after { content: " ·오늘"; font-size: 10px; color: #d97706; }
  .day.active.today-mark b::after { color: #b45309; }

  /* ── 식당 탭 (칩) ── */
  .rests {
    max-width: 640px; margin: 8px auto 0;
    display: flex; gap: 6px; overflow-x: auto;
    scrollbar-width: none;
  }
  .rests::-webkit-scrollbar { display: none; }
  .chip {
    flex: 0 0 auto; border: none; border-radius: 999px;
    background: rgba(255,255,255,0.12); color: #fff;
    padding: 7px 14px; cursor: pointer;
    font-family: inherit; font-size: 13px; font-weight: 600;
    white-space: nowrap; line-height: 1.2;
  }
  .chip.active { background: #ffd66b; color: var(--navy); }

  /* ── 본문 ── */
  main { max-width: 640px; margin: 0 auto; padding: 16px 12px 60px; }

  .restaurant {
    background: var(--card); border-radius: var(--radius);
    border: 1px solid var(--line);
    margin-bottom: 14px; overflow: hidden;
  }
  .restaurant .head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 15px 16px;
  }
  .restaurant .name { font-size: 17px; font-weight: 700; }
  .restaurant .loc { font-size: 12px; color: var(--sub); margin-top: 2px; }
  .restaurant .count {
    font-size: 12px; color: var(--navy); background: var(--navy-soft);
    border-radius: 20px; padding: 4px 10px; white-space: nowrap;
  }
  .restaurant .body { border-top: 1px solid var(--line); padding: 6px 16px 14px; }
  .restaurant.closed .body { display: none; }

  .corner { padding: 12px 0; }
  .corner + .corner { border-top: 1px dashed var(--line); }

  /* 상시(고정) 메뉴 구분 라벨 */
  .section-label {
    font-size: 11px; font-weight: 700; color: var(--sub);
    letter-spacing: 0.4px;
    margin-top: 6px; padding: 12px 0 2px;
    border-top: 1px solid var(--line);
  }
  .section-label::before { content: "🕒 "; }
  .corner-head { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .corner-name { font-size: 13px; font-weight: 700; color: var(--sub); }
  .meal {
    font-size: 11px; font-weight: 700;
    border-radius: 6px; padding: 2px 7px;
  }
  .meal.조식 { color: var(--breakfast); background: var(--breakfast-bg); }
  .meal.중식 { color: var(--lunch); background: var(--lunch-bg); }
  .meal.석식 { color: var(--dinner); background: var(--dinner-bg); }
  .meal.중식석식 { color: var(--lunch); background: var(--lunch-bg); }
  .meal.next {
    outline: 2px solid currentColor; outline-offset: 1px;
  }

  .item {
    display: flex; align-items: baseline; justify-content: space-between;
    gap: 12px; margin-top: 8px;
  }
  .item .menu-name { font-size: 15px; line-height: 1.45; }
  .item .price {
    font-variant-numeric: tabular-nums;
    font-size: 14px; font-weight: 700; color: var(--navy);
    white-space: nowrap;
  }

  .empty {
    text-align: center; color: var(--sub);
    padding: 60px 20px; font-size: 15px; line-height: 1.7;
  }
  footer {
    max-width: 640px; margin: 0 auto; padding: 0 16px 40px;
    font-size: 12px; color: var(--sub); text-align: center;
  }
  footer a { color: var(--sub); }

  @media (prefers-reduced-motion: no-preference) {
    .restaurant { animation: rise 0.25s ease both; }
    @keyframes rise { from { opacity: 0; transform: translateY(6px); } }
  }
</style>
</head>
<body>

<header>
  <div class="wrap">
    <h1><span class="bowl">🍚</span> 국민대 오늘의 학식</h1>
    <div class="updated" id="updated">불러오는 중…</div>
  </div>
</header>

<nav>
  <div class="days" id="days"></div>
  <div class="rests" id="rests"></div>
</nav>

<main id="main"><div class="empty">메뉴를 불러오는 중이에요…</div></main>

<footer>
  메뉴는 매일 새벽 자동 갱신됩니다. 실제 운영과 다를 수 있어요.<br>
  출처: 국민대학교 오늘의 메뉴
</footer>

<script>
/* ────────────────────────────────────────────────
   1) 데이터 불러오기
   같은 폴더의 menus.json을 읽는다 (크롤러가 만든 파일)
──────────────────────────────────────────────── */
let DATA = null;
let selectedDate = null;
let selectedRestaurant = null;  // 선택된 식당 base 이름

const WEEKDAYS = ["일", "월", "화", "수", "목", "금", "토"];
const MAX_TAB_DAYS = 21;  // 탭에 노출할 최근 기간(약 3주)

// 식당 표시 순서(이용자 많은 순). 목록에 없는 식당은 맨 뒤로.
const RESTAURANT_ORDER = ["학생식당", "한울식당", "교직원식당", "청향 한식당", "청향 양식당", "K-Bob+"];
const LS_KEY = "kmu-last-restaurant";  // 마지막으로 본 식당 저장

// "한울식당(법학관 지하1층)" → "한울식당"
function baseName(fullName) {
  const m = fullName.match(/^(.*?)\s*\(/);
  return (m ? m[1] : fullName).trim();
}

// 고정 순서대로 정렬된 식당 목록
function orderedRestaurants() {
  const rank = n => {
    const i = RESTAURANT_ORDER.indexOf(baseName(n));
    return i < 0 ? RESTAURANT_ORDER.length : i;  // 목록에 없으면 맨 뒤
  };
  return DATA.restaurants
    .map((r, i) => [r, i])
    .sort((a, b) => rank(a[0].name) - rank(b[0].name) || a[1] - b[1])
    .map(pair => pair[0]);
}

function saveLastRestaurant(name) {
  try { localStorage.setItem(LS_KEY, name); } catch (e) {}
}
function readLastRestaurant() {
  try { return localStorage.getItem(LS_KEY); } catch (e) { return null; }
}

fetch("menus.json")
  .then(res => res.json())
  .then(data => {
    DATA = data;
    init();
  })
  .catch(() => {
    document.getElementById("main").innerHTML =
      '<div class="empty">메뉴를 불러오지 못했어요 😢<br>잠시 후 새로고침 해주세요.</div>';
  });

/* ────────────────────────────────────────────────
   2) 초기화: 날짜 목록 만들고 오늘 선택
──────────────────────────────────────────────── */
function init() {
  // 데이터에 있는 모든 날짜를 모아 정렬
  const dateSet = new Set();
  DATA.restaurants.forEach(r =>
    r.menus.forEach(m => dateSet.add(m.date))
  );
  const allDates = [...dateSet].sort();

  // 오늘 날짜 (예: "2026-07-10")
  const today = new Date().toLocaleDateString("sv-SE"); // sv-SE 로케일 = YYYY-MM-DD 형식

  // 과거 데이터가 쌓여도 탭이 길어지지 않게 최근 약 3주치만 노출
  const cutoff = new Date(today + "T00:00:00").getTime() - MAX_TAB_DAYS * 86400000;
  let dates = allDates.filter(d => new Date(d + "T00:00:00").getTime() >= cutoff);
  if (!dates.length) dates = allDates.slice(-MAX_TAB_DAYS);

  // 기본 선택: 오늘이 있으면 오늘, 없으면 가장 최근 날짜
  selectedDate = dates.includes(today) ? today : dates[dates.length - 1];

  // 업데이트 시각 표시
  const t = new Date(DATA.fetched_at);
  document.getElementById("updated").textContent =
    `업데이트 ${t.getMonth() + 1}/${t.getDate()} ${String(t.getHours()).padStart(2, "0")}:${String(t.getMinutes()).padStart(2, "0")}`;

  // 요일 탭 만들기
  const daysEl = document.getElementById("days");
  daysEl.innerHTML = dates.map(d => {
    const dt = new Date(d + "T00:00:00");
    const isToday = d === today;
    const isPast = d < today;  // 지난 날짜는 흐리게 표시
    return `<button class="day ${d === selectedDate ? "active" : ""} ${isToday ? "today-mark" : ""} ${isPast ? "past" : ""}"
              data-date="${d}">
              <b>${WEEKDAYS[dt.getDay()]}</b>${dt.getMonth() + 1}/${dt.getDate()}
            </button>`;
  }).join("");

  daysEl.querySelectorAll(".day").forEach(btn => {
    btn.addEventListener("click", () => {
      selectedDate = btn.dataset.date;
      daysEl.querySelectorAll(".day").forEach(b => b.classList.toggle("active", b === btn));
      render();
    });
  });

  // 열 때 선택된(오늘) 탭이 가로 스크롤의 가운데 오도록 이동
  // (scrollIntoView는 sticky nav/오프셋부모 영향이 있어, rect로 직접 계산)
  centerScroll(daysEl, activeBtnOf(daysEl));

  // 식당 탭 초기화
  const ordered = orderedRestaurants();
  const names = ordered.map(r => baseName(r.name));
  const saved = readLastRestaurant();
  // 저장된 식당이 현재 데이터에 있으면 그걸, 아니면 학생식당(없으면 첫 번째)
  selectedRestaurant = (saved && names.includes(saved)) ? saved
    : (names.includes("학생식당") ? "학생식당" : names[0]);

  const restsEl = document.getElementById("rests");
  restsEl.innerHTML = ordered.map(r => {
    const n = baseName(r.name);
    return `<button class="chip ${n === selectedRestaurant ? "active" : ""}" data-rest="${n}">${n}</button>`;
  }).join("");

  restsEl.querySelectorAll(".chip").forEach(btn => {
    btn.addEventListener("click", () => {
      selectedRestaurant = btn.dataset.rest;
      saveLastRestaurant(selectedRestaurant);
      restsEl.querySelectorAll(".chip").forEach(b => b.classList.toggle("active", b === btn));
      render();
    });
  });
  centerScroll(restsEl, restsEl.querySelector(".chip.active"));

  render();
}

// 가로 스크롤 컨테이너에서 대상 버튼을 가운데로 이동
function activeBtnOf(container) { return container.querySelector(".active"); }
function centerScroll(container, target) {
  if (!target) return;
  const cRect = container.getBoundingClientRect();
  const bRect = target.getBoundingClientRect();
  const delta = (bRect.left - cRect.left) - (container.clientWidth - bRect.width) / 2;
  container.scrollLeft += delta;
}

/* ────────────────────────────────────────────────
   3) 지금 시각 기준 "다가오는 끼니" 계산
   (10:30 전 = 조식, 15:00 전 = 중식, 그 후 = 석식)
──────────────────────────────────────────────── */
function nextMeal() {
  const h = new Date().getHours() + new Date().getMinutes() / 60;
  if (h < 10.5) return "조식";
  if (h < 15) return "중식";
  return "석식";
}

/* ────────────────────────────────────────────────
   4) 화면 그리기: 선택된 날짜의 식당 카드들
──────────────────────────────────────────────── */
// 코너 블록 하나를 HTML로
function cornerHtml(m, highlight) {
  const mealBadge = m.meal
    ? `<span class="meal ${m.meal.replace("/", "")} ${m.meal === highlight ? "next" : ""}">${m.meal}</span>`
    : "";
  const itemsHtml = m.items.map(i => `
    <div class="item">
      <span class="menu-name">${i.name}</span>
      ${i.price ? `<span class="price">${i.price.toLocaleString()}원</span>` : ""}
    </div>`).join("");
  return `
    <div class="corner">
      <div class="corner-head">
        <span class="corner-name">${m.corner}</span>${mealBadge}
      </div>
      ${itemsHtml}
    </div>`;
}

// 코너별로 '변동(매일 바뀜)' vs '고정(상시)'을 최근 평일 데이터로 판별
function classifyCorners(restaurant) {
  // 최근 평일(월~금) 최대 10일치만 사용
  const dates = [...new Set(restaurant.menus.map(m => m.date))]
    .filter(d => { const wd = new Date(d + "T00:00:00").getDay(); return wd >= 1 && wd <= 5; })
    .sort().slice(-10);
  const dateSet = new Set(dates);

  const sig = {};  // corner -> { date -> items 시그니처 }
  restaurant.menus.forEach(m => {
    if (!dateSet.has(m.date)) return;
    sig[m.corner] = sig[m.corner] || {};
    sig[m.corner][m.date] = (sig[m.corner][m.date] || "")
      + m.items.map(i => i.name + ":" + i.price).join("|") + "#";
  });

  const cls = {};
  for (const corner in sig) {
    const vals = Object.values(sig[corner]);
    // 평일 2일 이상 관측되고 매일 동일하면 '고정(상시)', 아니면 '변동'
    cls[corner] = (vals.length >= 2 && new Set(vals).size === 1) ? "fixed" : "varying";
  }
  return cls;
}

function render() {
  const main = document.getElementById("main");
  const isToday = selectedDate === new Date().toLocaleDateString("sv-SE");
  const highlight = isToday ? nextMeal() : null;

  // 선택된 식당 하나만 표시
  const r = DATA.restaurants.find(x => baseName(x.name) === selectedRestaurant)
    || DATA.restaurants[0];

  const match = r.name.match(/^(.*?)\((.*)\)$/);
  const name = match ? match[1] : r.name;
  const loc = match ? match[2] : "";

  const menus = r.menus.filter(m => m.date === selectedDate && m.items.length);

  // 매일 바뀌는 코너는 위로, 상시(고정) 코너는 아래로 (그룹 내 순서는 유지)
  const cls = classifyCorners(r);
  const varying = menus.filter(m => cls[m.corner] !== "fixed");
  const fixed = menus.filter(m => cls[m.corner] === "fixed");

  const body = menus.length
    ? varying.map(m => cornerHtml(m, highlight)).join("")
      + (fixed.length
        ? `<div class="section-label">상시 메뉴</div>` + fixed.map(m => cornerHtml(m, highlight)).join("")
        : "")
    : `<div class="empty">이 날짜에는 ${name} 메뉴가 없어요.<br>주말이거나 휴점일 수 있어요 🌙</div>`;

  main.innerHTML = `
    <section class="restaurant">
      <div class="head">
        <span>
          <div class="name">${name}</div>
          ${loc ? `<div class="loc">📍 ${loc}</div>` : ""}
        </span>
        ${menus.length ? `<span class="count">${menus.length}개 코너</span>` : ""}
      </div>
      <div class="body">${body}</div>
    </section>`;
}
</script>
</body>
</html>
